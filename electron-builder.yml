appId: com.circoloquinte.app
productName: Circolo delle Quinte
copyright: Copyright 2024

directories:
  output: release
  buildResources: build

files:
  - dist/**/*
  - electron/**/*
  - package.json
  - "!**/{.git,.DS_Store,npm-debug.log}"

win:
  target:
    - nsis
    - portable
  icon: build/icon.ico
  artifactName: ${productName}-${version}-Windows-${arch}.${ext}

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: always
  createStartMenuShortcut: true

mac:
  target:
    - dmg
    - zip
  category: public.app-category.education
  icon: build/icon.icns
  hardenedRuntime: true
  gatekeeperAssess: false

dmg:
  contents:
    - x: 410
      y: 150
      type: link
      path: /Applications
    - x: 130
      y: 150
      type: file

linux:
  target:
    - AppImage
    - deb
    - rpm
  category: Education
  icon: build/icons
  artifactName: ${productName}-${version}-Linux-${arch}.${ext}
